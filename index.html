<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>8x - Share</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>📁 8x Share</h1>

        <p class="subtitle">
            Partage tes fichiers rapidement et simplement
        </p>


        <div class="upload-box">

            <div class="icon">
                ☁️
            </div>

            <h2>
                Envoyer un fichier
            </h2>

            <p>
                Choisis un fichier puis clique sur envoyer
            </p>


            <input 
                type="file" 
                id="file"
            >


            <br>


            <button id="uploadBtn">
                🚀 Envoyer
            </button>


            <p id="status"></p>

        </div>


        <footer>
            © 2026 LixFiles • Par Lixixss
        </footer>

    </div>



    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Ton code -->
    <script src="script.js"></script>


</body>

</html>
